# docker-compose.yml — Meeting Transcriber web UI
#
# Запуск:     docker compose up --build
# Остановка:  Ctrl+C  (или docker compose down)
# Браузер:    http://localhost:8080

services:
  meeting-transcriber:
    build: .
    image: meeting-transcriber
    # Override ENTRYPOINT — запускаем Flask вместо entrypoint.sh
    entrypoint: ["python", "/app/app.py"]
    ports:
      - "8080:8080"
    volumes:
      - ./input:/input
      - ./output:/output
      - ./processed:/processed
      - ./failed:/failed
      - ./logs:/logs
      # Кэш моделей HuggingFace — сохраняется между перезапусками
      - hf_cache:/root/.cache/huggingface
    env_file: .env
    # Позволяет Flask-серверу обращаться к LLM, запущенному на хосте
    # (нужно если LLM_BASE_URL=http://localhost:XXXX)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    # GPU (NVIDIA). Если GPU нет — блок deploy игнорируется
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  hf_cache:

